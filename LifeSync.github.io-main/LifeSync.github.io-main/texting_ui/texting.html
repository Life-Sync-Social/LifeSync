<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeSync - Texting UI</title>
    <link rel="stylesheet" href="../base.css">
    <link rel="stylesheet" href="texting.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <h1>LifeSync</h1>
            <div id="userInfo" style="font-size: 14px; margin-top: 5px; color:white"></div>
        </header>

        <!-- Messages Area -->
        <div class="messages-container" id="messagesContainer">
            <div class="message own-message">
                <div class="message-bubble">
                    <p>Welcome to LifeSync Texting UI!</p>
                </div>
                <span class="message-timestamp" id="welcomeTimestamp"></span>
            </div>
        </div>

        <!-- AI Suggestions Panel -->
        <div id="aiSuggestionsPanel" class="ai-suggestions-panel">
            <div class="ai-suggestions-header">
                <span>AI Suggestions</span>
                <button id="closeSuggestionsBtn" class="close-suggestions-btn">✕</button>
            </div>
            <div class="ai-suggestions-content">
                <button class="ai-suggestion-item" data-suggestion="1">
                    <span class="suggestion-icon">✅</span>
                    <span class="suggestion-text">Suggestion 1 (placeholder)</span>
                </button>
                <button class="ai-suggestion-item" data-suggestion="2">
                    <span class="suggestion-icon">❌</span>
                    <span class="suggestion-text">Suggestion 2 (placeholder)</span>
                </button>
                <button class="ai-suggestion-item" data-suggestion="3">
                    <span class="suggestion-icon">😐</span>
                    <span class="suggestion-text">Suggestion 3 (placeholder)</span>
                </button>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <button id="aiButton" class="ai-button" title="AI Suggestions">
                <span class="ai-icon">✨</span>
            </button>
            <input
                type="text"
                id="messageInput"
                class="message-input"
                placeholder="Type a message..."
                autocomplete="off"
            >
            <button id="sendButton" class="send-button">↑</button>
        </div>

        <!-- Scroll to Input Button (for small devices) -->
        <button id="scrollToInputBtn" class="scroll-to-input-btn" title="Scroll to textbox">
            ✎
        </button>
    </div>

    <script>
        // Check if user is logged in
        const isLoggedIn = sessionStorage.getItem('isLoggedIn');
        const username = sessionStorage.getItem('username');

        if (!isLoggedIn) {
            // Redirect to login if not logged in
            window.location.href = '../login_signup/login.html';
        } else {
            // Display username
            document.getElementById('userInfo').textContent = 'Logged in as: ' + username;
        }
    </script>
    <script src="app.js"></script>
</body>
</html>
