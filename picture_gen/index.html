<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeSync - Picture Generator</title>
    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="picture_gen.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <button onclick="window.location.href='../home_page/index.html'" class="back-btn" title="Back to Home">
                <span class="back-icon">←</span>
            </button>
            <h1>AR Filter Generator</h1>
        </header>

        <div class="main-content">
            <div class="content-header">
                <h2>Generate an AR Face Filter</h2>
            </div>

            <div id="tokenSetup" class="token-setup needed">
                <div class="token-bar">
                    <label for="tokenInput">HuggingFace API Key:</label>
                    <input type="password" id="tokenInput" class="token-input" placeholder="hf_..." autocomplete="off">
                    <button id="tokenSaveBtn" class="token-save-btn">Save</button>
                    <span id="tokenStatus" class="token-status"></span>
                </div>
                <p class="token-hint">Free key from <a href="https://huggingface.co/settings/tokens" target="_blank" rel="noopener">huggingface.co/settings/tokens</a>. Stored locally in your browser only.</p>
            </div>

            <div class="prompt-section">
                <div class="prompt-row">
                    <input
                        type="text"
                        id="promptInput"
                        class="prompt-input"
                        placeholder="Describe your AR face filter... e.g. 'tiger face paint with glowing eyes'"
                        autocomplete="off">
                    <button id="generateBtn" class="generate-btn">
                        <span class="generate-icon">✨</span>
                        <span class="generate-text">Generate</span>
                    </button>
                </div>
            </div>

            <div id="resultSection" class="result-section">
                <div id="resultContent" class="result-placeholder">
                    Describe your AR filter and click Generate. The AI will create a face overlay image you can apply with the AR camera.
                </div>
                <div id="errorMsg" class="error-msg" style="display: none;"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
