<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeSync - Dashboard</title>
    <link rel="stylesheet" href="../base.css">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body class="dashboard-body">
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="dashboard-sidebar">
            <div class="sidebar-header">
                <h2>LifeSync</h2>
                <div id="userInfo" class="user-info"></div>
            </div>

            <nav class="sidebar-nav">
                <a href="texting.html" class="nav-item">
                    <span class="nav-icon">💬</span>
                    <span class="nav-text">Texting</span>
                </a>
                <a href="#" class="nav-item">
                    <span class="nav-icon">📇</span>
                    <span class="nav-text">Friends</span>
                </a>
                <a href="#" class="nav-item">
                    <span class="nav-icon">🤳</span>
                    <span class="nav-text">AR Filters</span>
                </a>
                <a href="#" class="nav-item">
                    <span class="nav-icon">🖌️</span>
                    <span class="nav-text">AIAG</span>
                </a>
                <a href="#" class="nav-item">
                    <span class="nav-icon">🔎</span>
                    <span class="nav-text">AIAS</span>
                </a>
                <a href="#" class="nav-item">
                    <span class="nav-icon"><img src="https://imgproxy.attic.sh/insecure/f:png/plain/https://attic.sh/8dft66qmpbd0wjkkkbb6ygobq24m" alt="LifeStacks" style="width: 1.2em; height: 1.2em; vertical-align: middle;"></span>
                    <span class="nav-text">LifeStacks</span>
                    </a>
                <a href="#" class="nav-item">
                    <span class="nav-icon">🖥️</span>
                    <span class="nav-text">AIP</span>
                </a>
                <a href="#" class="nav-item">
                    <span class="nav-icon">+</span>
                    <span class="nav-text">Extras</span>
                
            </nav>
           
            <div class="sidebar-footer">
                <button id="logoutBtn" class="logout-btn">Logout</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main">
            <div class="dashboard-content">
                <h1>Welcome to LifeSync</h1>
                <p>Select an option from the sidebar to get started</p>
            </div>
        </main>
    </div>

    <script>
        // Check if user is logged in
        const isLoggedIn = sessionStorage.getItem('isLoggedIn');
        const username = sessionStorage.getItem('username');

        if (!isLoggedIn) {
            // Redirect to login if not logged in
            window.location.href = 'login.html';
        } else {
            // Display username
            document.getElementById('userInfo').textContent = username;
        }

        // Logout functionality
        document.getElementById('logoutBtn').addEventListener('click', function() {
            sessionStorage.clear();
            window.location.href = 'first_page.html';
        });
    </script>
</body>
</html>
